<div class="login-container">
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-card">
    <h2>Acesso ao Painel Financeiro</h2>
    
    <div class="input-group">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" [(ngModel)]="credentials.username" required>
    </div>

    <div class="input-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" [(ngModel)]="credentials.senha" required>
    </div>

    <button type="submit" [disabled]="!loginForm.form.valid">Entrar</button>
    
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </form>
</div>
